services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devflow}
      POSTGRES_DB: ${POSTGRES_DB:-devflow}
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devflow"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_started}
    ports: ["8000:8000"]
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes: [".:/code"]

  worker:
    build: .
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on: [redis, db]
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes: [".:/code"]

volumes:
  pgdata:
